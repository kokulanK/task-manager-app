server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend (if needed, but we use full URLs from environment)
    # Not needed because Angular will call the backend via its URL (configured in environment)
}