<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>My Tasks</h3>
    <button class="btn btn-primary" (click)="openTaskForm()">+ Add Task</button>
  </div>

  <!-- Filter Row -->
  <div class="filter-row row g-3">
    <div class="col-md-4">
      <input
        type="text"
        class="form-control"
        placeholder="Search by title..."
        [(ngModel)]="searchTerm"
        (input)="applyFilter()"
      />
    </div>
    <div class="col-md-3">
      <select class="form-select" [(ngModel)]="selectedStatus" (change)="applyFilter()">
        <option value="ALL">All Status</option>
        <option value="TO_DO">To Do</option>
        <option value="IN_PROGRESS">In Progress</option>
        <option value="DONE">Done</option>
      </select>
    </div>
    <div class="col-md-3">
      <select class="form-select" [(ngModel)]="selectedPriority" (change)="applyFilter()">
        <option value="ALL">All Priorities</option>
        <option value="HIGH">High</option>
        <option value="MEDIUM">Medium</option>
        <option value="LOW">Low</option>
      </select>
    </div>
  </div>

  <!-- Separate tables for each status group -->
  <div *ngFor="let status of statusOrder">
    <div *ngIf="groupedTasks[status].length > 0">
      <h4 class="mt-4">{{ getStatusTitle(status) }}</h4>
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Description</th>
              <th>Priority</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let task of groupedTasks[status]">
              <td data-label="Title">{{ task.title }}</td>
              <td data-label="Description">{{ task.description || '—' }}</td>
              <td data-label="Priority">
                <select class="form-select form-select-sm" [value]="task.priority" (change)="updatePriority(task, $event)">
                  <option value="LOW">Low</option>
                  <option value="MEDIUM">Medium</option>
                  <option value="HIGH">High</option>
                </select>
              </td>
              <td data-label="Status">
                <select class="form-select form-select-sm" [value]="task.status" (change)="updateStatus(task, $event)">
                  <option value="TO_DO">To Do</option>
                  <option value="IN_PROGRESS">In Progress</option>
                  <option value="DONE">Done</option>
                </select>
              </td>
              <td data-label="Actions">
                <button class="btn btn-sm btn-warning me-2" (click)="editTask(task)">Edit</button>
                <button class="btn btn-sm btn-danger" (click)="deleteTask(task.id!)">Delete</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- No results message -->
  <div *ngIf="getTotalFilteredCount() === 0" class="alert alert-info mt-3">
    No tasks match your filters. <a href="#" (click)="clearFilters($event)">Clear filters</a>
  </div>
</div>

<!-- Task Form Modal -->
<app-task-form
  [task]="selectedTask"
  [isOpen]="showForm"
  (close)="closeForm()"
  (save)="onTaskSaved($event)"
></app-task-form>
