<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <h2>Welcome Back</h2>
      <p>Sign in to continue</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" formControlName="email" placeholder="your@email.com" />
        <small *ngIf="f['email'].invalid && f['email'].touched">
          <span *ngIf="f['email'].errors?.['required']">Email is required</span>
          <span *ngIf="f['email'].errors?.['email']">Enter a valid email</span>
        </small>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="••••••" />
        <small *ngIf="f['password'].invalid && f['password'].touched">
          <span *ngIf="f['password'].errors?.['required']">Password is required</span>
          <span *ngIf="f['password'].errors?.['minlength']">At least 6 characters</span>
        </small>
      </div>

      <button type="submit" class="btn-login" [disabled]="loginForm.invalid">Sign In</button>
    </form>

    <div class="login-footer">
      <p>Don't have an account? <a routerLink="/register">Create one</a></p>
    </div>

  </div>
</div>
